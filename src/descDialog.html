<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Task Details Dialog</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />

    <style>
      /* Base Reset */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Manrope", sans-serif;
        background-color: #f9f9fb;
        color: #1a1c1d;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
      }

      /* Material Icons Base */
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
        display: inline-block;
        vertical-align: middle;
      }

      /* --- Dialog Base Styles --- */
      .task-dialog {
        width: 100%;
        max-width: 672px;
        margin: auto;
        border: none;
        border-radius: 0.75rem;
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        box-shadow: 0px 12px 32px rgba(11, 26, 125, 0.06);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        padding: 0;
      }

      /* Fixes ghosting when the dialog is not open */
      .task-dialog:not([open]) {
        display: none;
      }

      .task-dialog::backdrop {
        background-color: rgba(26, 28, 29, 0.2);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
      }

      /* --- Header Area --- */
      .dialog-header {
        padding: 32px 32px 16px 32px;
      }

      .dialog-header-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 8px;
      }

      .project-tag {
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        color: #3b6663;
        text-transform: uppercase;
      }

      .close-btn {
        background: none;
        border: none;
        color: #454652;
        cursor: pointer;
        padding: 0;
        transition: color 0.2s ease;
      }

      .close-btn:hover {
        color: #1a1c1d;
      }

      .task-title {
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: -0.025em;
        color: #1a1c1d;
        line-height: 1.2;
      }

      /* --- Content Area --- */
      .content-area {
        padding: 16px 32px 32px 32px;
        display: flex;
        flex-direction: column;
        gap: 32px;
      }

      /* --- Metadata Grid --- */
      .meta-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }

      .meta-item {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .meta-label {
        font-size: 0.625rem;
        font-weight: 700;
        color: rgba(69, 70, 82, 0.6);
        text-transform: uppercase;
        letter-spacing: -0.05em;
      }

      .meta-box {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 0.5rem;
      }

      .meta-text {
        font-size: 0.875rem;
      }

      .status-box {
        background-color: rgba(187, 232, 228, 0.3);
        color: #3f6a67;
      }

      .status-box .meta-text {
        font-weight: 600;
      }

      .date-box {
        background-color: #f3f3f5;
        color: #1a1c1d;
      }

      .date-box .meta-text {
        font-weight: 500;
      }

      .priority-box {
        background-color: rgba(255, 218, 214, 0.2);
        color: #ba1a1a;
      }

      .priority-box .meta-text {
        font-weight: 700;
      }

      /* --- Description Section --- */
      .desc-section {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .desc-header {
        display: flex;
        align-items: center;
        gap: 8px;
        color: #454652;
      }

      .desc-header-text {
        font-size: 0.875rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: -0.025em;
      }

      .task-description {
        width: 100%;
        min-height: 120px;
        background-color: #f3f3f5;
        border-radius: 0.75rem;
        padding: 16px;
        color: #454652;
        line-height: 1.625;
      }
    </style>
  </head>
  <body>
    <script>
    function createTaskDetailsDialog(todo) {
        // 1. Create the dialog element
        const dialog = document.createElement("dialog");
        dialog.id = "taskDialog";
        dialog.className = "task-dialog";

        // --- Header Section ---
        const header = document.createElement("div");
        header.className = "dialog-header";

        const headerTop = document.createElement("div");
        headerTop.className = "dialog-header-top";

        const projectTag = document.createElement("span");
        projectTag.className = "project-tag";
        projectTag.textContent = `Project: ${todo.projectName}`;

        const closeBtn = document.createElement("button");
        closeBtn.className = "close-btn";
        // Best practice: Use event listener instead of inline onclick attribute
        closeBtn.addEventListener("click", () => dialog.close());

        const closeIcon = document.createElement("span");
        closeIcon.className = "material-symbols-outlined";
        closeIcon.textContent = "close";

        closeBtn.appendChild(closeIcon);
        headerTop.appendChild(projectTag);
        headerTop.appendChild(closeBtn);

        const title = document.createElement("h1");
        title.className = "task-title";
        title.textContent = todo.title;

        header.appendChild(headerTop);
        header.appendChild(title);
        dialog.appendChild(header);

        // --- Content Area ---
        const contentArea = document.createElement("div");
        contentArea.className = "content-area";

        // --- Metadata Grid ---
        const metaGrid = document.createElement("div");
        metaGrid.className = "meta-grid";

        // Helper Function: Keeps DOM generation clean for repeating elements
        const createMetaItem = (labelText, iconName, valueText, boxClass) => {
          const metaItem = document.createElement("div");
          metaItem.className = "meta-item";

          const metaLabel = document.createElement("span");
          metaLabel.className = "meta-label";
          metaLabel.textContent = labelText;

          const metaBox = document.createElement("div");
          metaBox.className = `meta-box ${boxClass}`;

          const icon = document.createElement("span");
          icon.className = "material-symbols-outlined";
          // icon.style.cssText = iconStyles; // Apply inline styles for specific icons
          icon.textContent = iconName;

          const text = document.createElement("span");
          text.className = "meta-text";
          text.textContent = valueText;

          metaBox.appendChild(icon);
          metaBox.appendChild(text);
          metaItem.appendChild(metaLabel);
          metaItem.appendChild(metaBox);

          return metaItem;
        };

        // 1. Status Meta Item (Dynamic based on todo.completed)
        const statusText = todo.completed ? "Completed" : "In Progress";
        const statusIcon = todo.completed ? "check_circle" : "sync";
        metaGrid.appendChild(
          createMetaItem("Status", statusIcon, statusText, "status-box"),
        );

        // 2. Due Date Meta Item
        metaGrid.appendChild(
          createMetaItem(
            "Due Date",
            "calendar_today",
            todo.dueDate,
            "date-box",
          ),
        );

        // 3. Priority Meta Item
        metaGrid.appendChild(
          createMetaItem(
            "Priority",
            "priority_high",
            todo.priority,
            "priority-box",
          ),
        );

        contentArea.appendChild(metaGrid);

        // --- Description Section ---
        const descSection = document.createElement("div");
        descSection.className = "desc-section";

        const descHeader = document.createElement("div");
        descHeader.className = "desc-header";

        const descIcon = document.createElement("span");
        descIcon.className = "material-symbols-outlined";
        //   descIcon.style.fontSize = "20px";
        descIcon.textContent = "description";

        const descHeaderText = document.createElement("span");
        descHeaderText.className = "desc-header-text";
        descHeaderText.textContent = "Description";

        descHeader.appendChild(descIcon);
        descHeader.appendChild(descHeaderText);

        const descPara = document.createElement("p");
        descPara.className = "task-description";
        descPara.textContent = todo.description;

        descSection.appendChild(descHeader);
        descSection.appendChild(descPara);

        contentArea.appendChild(descSection);
        dialog.appendChild(contentArea);

        return dialog;
      }
    </script>

    <script>
      // 1. Your mock data object
      const myTask = {
        title: "Q4 Editorial Strategy Revamp",
        description:
          "Define the visual direction for the upcoming Q4 campaign. We need to align the typography guidelines with the new Aeon design system...",
        dueDate: "Oct 24, 2023",
        priority: "High",
        projectName: "Marketing",
        completed: false,
      };

      // 2. Generate the dialog
      const taskDetailsModal = createTaskDetailsDialog(myTask);

      // 3. Append to body and show it
      document.body.appendChild(taskDetailsModal);
      taskDetailsModal.showModal();
    </script>
  </body>
</html>
